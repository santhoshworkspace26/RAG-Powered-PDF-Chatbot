<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in – PDF Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 52 52" fill="none">
                <path d="M26 4C26 4 28 18 34 26C28 34 26 48 26 48C26 48 24 34 18 26C24 18 26 4 26 4Z" fill="#4285F4"/>
                <path d="M4 26C4 26 18 24 26 18C34 24 48 26 48 26C48 26 34 28 26 34C18 28 4 26 4 26Z" fill="#34A853"/>
            </svg>
        </div>
        <h1>Welcome back</h1>
        <p class="auth-sub">Sign in to continue to PDF Chatbot</p>
        {% if error %}
        <div class="auth-error">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="field">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="auth-btn">Sign in</button>
        </form>
        <p class="auth-switch">New here? <a href="/signup">Create an account</a></p>
    </div>
</div>
</body>
</html>
